<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Интернет-магазин (fetch)</title>
    <script src="./index.js" type="module"></script>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <h1>Интернет-магазин</h1>
    <button class="administrator__rights">Права администратора</button>
    <div id="message"></div>

    <h2>Товары</h2>
    <div id="products__containers">Загрузка товаров...</div>

    <template class="product__container">
      <div class="content_wrapper">
        <h3 class="product__name"></h3>
        <img class="product__picture" src="" alt="" />
        <ul class="product__specifications">
          <li class="product__price"></li>
          <li class="product__description"></li>
          <li class="product__category"></li>
          <li class="product__stock"></li>
          <li class="product__rating"></li>
        </ul>
        <button class="product__buy">Купить</button>
      </div>
    </template>
  </body>
</html>
