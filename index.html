<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Интернет-магазин (fetch)</title>
    <script src="./JS/index.js" type="module"></script>
    <link rel="stylesheet" href="./css/import.css" />
  </head>
  <body class="body">
    <h1>Интернет-магазин</h1>

    <div class="admin">
      <input
        class="admin__password"
        type="password"
        placeholder="Введите пароль"
        required
      />
      <button class="admin__button">Права администратора</button>
    </div>

    <h2>Товары</h2>
    <div id="products-list" class="productsList">Сервер не доступен</div>

    <template id="product-template">
      <div class="product">
        <h3 class="product__name"></h3>
        <img class="product__image" src="" alt="" />
        <ul class="product__specs">
          <li class="product__price"><span class="product__text">Цена: </span></li>
          <li class="product__description"><span class="product__text">Характеристикa: </span></li>
          <li class="product__category"><span class="product__text">Категория: </span></li>
          <li class="product__stock"><span class="product__text">Остаток на складе: </span></li>
          <li class="product__rating"><span class="product__text">Рейтинг: </span></li>
        </ul>
        <button class="product__button">Купить</button>
      </div>
    </template>
  </body>
</html>
